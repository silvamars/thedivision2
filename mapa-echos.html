<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa de ECHOs - The Division 2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
height: 90vh;
width: 100%;
}
</style>

</head>
<body>

<h2>Mapa de ECHOs - The Division 2</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([38.9072, -77.0369], 13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19
}).addTo(map);

var echo1 = L.marker([38.9072, -77.0369]).addTo(map);

echo1.bindPopup(`
<b>Echo: Emergency Broadcast</b><br>
Local: Downtown East<br>
Relacionado ao colapso inicial
`);

</script>

</body>
</html>
